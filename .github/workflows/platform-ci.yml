name: platform-ci

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Test backend
        run: mvn -q test
      - name: Package backend
        run: mvn -q -DskipTests package

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package.json
      - name: Install frontend dependencies
        run: npm install
      - name: Typecheck rider app
        run: npm run typecheck --workspace rider-web
      - name: Typecheck driver app
        run: npm run typecheck --workspace driver-ops
      - name: Typecheck admin app
        run: npm run typecheck --workspace admin-dashboard

  ai-service:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-services/risk-scoring
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ai-services/risk-scoring/requirements.txt
      - name: Install AI dependencies
        run: pip install -r requirements.txt
      - name: Smoke import AI app
        run: python -c "from app.main import app; print(app.title)"

  docker-compose-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate docker compose
        run: docker compose -f infra/docker/docker-compose.yml config
