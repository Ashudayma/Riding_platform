services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: riding-platform-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-platform}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-platform}
      POSTGRES_DB: ${POSTGRES_DB:-riding_platform}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-platform} -d ${POSTGRES_DB:-riding_platform}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.2-alpine
    container_name: riding-platform-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: apache/kafka:3.8.1
    container_name: riding-platform-kafka
    restart: unless-stopped
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: true
      KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_CFG_NUM_PARTITIONS: 6
      KAFKA_KRAFT_CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      ALLOW_PLAINTEXT_LISTENER: "yes"
    volumes:
      - kafka-data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "/opt/bitnami/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: riding-platform-keycloak
    restart: unless-stopped
    command: start-dev --http-port=8081 --import-realm
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN_USER:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${KEYCLOAK_DB:-keycloak}
      KC_DB_USERNAME: ${POSTGRES_USER:-platform}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-platform}
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${KEYCLOAK_HTTP_PORT:-8081}:8081"
    volumes:
      - ../../docs/security/realm-export-riding-platform.json:/opt/keycloak/data/import/realm-export-riding-platform.json:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8081 && printf 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && grep -q '200' <&3"]
      interval: 20s
      timeout: 10s
      retries: 10

  backend:
    build:
      context: ../../backend
      dockerfile: ride-platform-app/Dockerfile
    container_name: riding-platform-backend
    restart: unless-stopped
    environment:
      PLATFORM_ENVIRONMENT: ${PLATFORM_ENVIRONMENT:-local}
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-riding_platform}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-platform}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-platform}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:8081/realms/riding-platform
      PLATFORM_SECURITY_ISSUER_URI: http://keycloak:8081/realms/riding-platform
      LOG_LEVEL_ROOT: ${BACKEND_LOG_LEVEL:-INFO}
      LOG_LEVEL_APP: ${BACKEND_LOG_LEVEL:-INFO}
      LOG_FILE_PATH: /var/log/riding-platform/ride-platform-app.log
      JAVA_OPTS: ${JAVA_OPTS:- -Xms512m -Xmx1024m}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - backend-logs:/var/log/riding-platform
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health/readiness >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 10

  ai-risk-scoring:
    build:
      context: ../../ai-services/risk-scoring
      dockerfile: Dockerfile
    container_name: riding-platform-ai-risk
    restart: unless-stopped
    environment:
      AI_SERVICE_LOG_LEVEL: ${AI_SERVICE_LOG_LEVEL:-INFO}
    ports:
      - "${AI_SERVICE_PORT:-8090}:8090"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8090/api/v1/health >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 10

  rider-web:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
      args:
        APP_NAME: rider-web
        APP_PORT: 3000
    container_name: riding-platform-rider-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://backend:8080
      NEXT_PUBLIC_WS_URL: ws://backend:8080/ws
      NEXT_PUBLIC_KEYCLOAK_ISSUER: http://localhost:${KEYCLOAK_HTTP_PORT:-8081}/realms/riding-platform
      NEXT_PUBLIC_KEYCLOAK_CLIENT_ID: riding-platform-web
      NEXT_PUBLIC_KEYCLOAK_REALM: riding-platform
      NEXT_PUBLIC_KEYCLOAK_BASE_URL: http://localhost:${KEYCLOAK_HTTP_PORT:-8081}
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${RIDER_WEB_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:3000"]
      interval: 20s
      timeout: 5s
      retries: 10

  driver-web:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
      args:
        APP_NAME: driver-ops
        APP_PORT: 3001
    container_name: riding-platform-driver-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://backend:8080
      NEXT_PUBLIC_WS_URL: ws://backend:8080/ws
      NEXT_PUBLIC_KEYCLOAK_ISSUER: http://localhost:${KEYCLOAK_HTTP_PORT:-8081}/realms/riding-platform
      NEXT_PUBLIC_KEYCLOAK_CLIENT_ID: riding-platform-web
      NEXT_PUBLIC_KEYCLOAK_REALM: riding-platform
      NEXT_PUBLIC_KEYCLOAK_BASE_URL: http://localhost:${KEYCLOAK_HTTP_PORT:-8081}
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${DRIVER_WEB_PORT:-3001}:3001"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:3001/home"]
      interval: 20s
      timeout: 5s
      retries: 10

  admin-web:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
      args:
        APP_NAME: admin-dashboard
        APP_PORT: 3002
    container_name: riding-platform-admin-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://backend:8080
      NEXT_PUBLIC_WS_URL: ws://backend:8080/ws
      NEXT_PUBLIC_KEYCLOAK_ISSUER: http://localhost:${KEYCLOAK_HTTP_PORT:-8081}/realms/riding-platform
      NEXT_PUBLIC_KEYCLOAK_CLIENT_ID: riding-platform-web
      NEXT_PUBLIC_KEYCLOAK_REALM: riding-platform
      NEXT_PUBLIC_KEYCLOAK_BASE_URL: http://localhost:${KEYCLOAK_HTTP_PORT:-8081}
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${ADMIN_WEB_PORT:-3002}:3002"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:3002/overview"]
      interval: 20s
      timeout: 5s
      retries: 10

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: riding-platform-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ../observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      backend:
        condition: service_healthy
      ai-risk-scoring:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:9090/-/healthy"]
      interval: 20s
      timeout: 5s
      retries: 10

  loki:
    image: grafana/loki:3.1.1
    container_name: riding-platform-loki
    restart: unless-stopped
    command: ["-config.file=/etc/loki/config.yml"]
    ports:
      - "${LOKI_PORT:-3100}:3100"
    volumes:
      - ../observability/loki/loki-config.yml:/etc/loki/config.yml:ro
      - loki-data:/loki
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:3100/ready"]
      interval: 20s
      timeout: 5s
      retries: 10

  promtail:
    image: grafana/promtail:3.1.1
    container_name: riding-platform-promtail
    restart: unless-stopped
    command: ["-config.file=/etc/promtail/config.yml"]
    volumes:
      - ../observability/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      loki:
        condition: service_healthy

  grafana:
    image: grafana/grafana:11.2.0
    container_name: riding-platform-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "${GRAFANA_PORT:-3005}:3000"
    volumes:
      - ../observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:3000/api/health"]
      interval: 20s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
  redis-data:
  kafka-data:
  backend-logs:
  prometheus-data:
  grafana-data:
  loki-data:
