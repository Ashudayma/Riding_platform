server:
  tomcat:
    threads:
      max: ${SERVER_TOMCAT_THREADS_MAX:400}
      min-spare: ${SERVER_TOMCAT_THREADS_MIN_SPARE:50}
    accept-count: ${SERVER_TOMCAT_ACCEPT_COUNT:200}
    max-connections: ${SERVER_TOMCAT_MAX_CONNECTIONS:8192}

spring:
  datasource:
    hikari:
      maximum-pool-size: ${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:40}
      minimum-idle: ${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:10}
      idle-timeout: ${SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT_MS:300000}
      max-lifetime: ${SPRING_DATASOURCE_HIKARI_MAX_LIFETIME_MS:1800000}
      connection-timeout: ${SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT_MS:3000}
      validation-timeout: ${SPRING_DATASOURCE_HIKARI_VALIDATION_TIMEOUT_MS:1000}
  data:
    redis:
      timeout: ${SPRING_DATA_REDIS_TIMEOUT_MS:1000ms}
      lettuce:
        pool:
          enabled: true
          max-active: ${SPRING_DATA_REDIS_LETTUCE_POOL_MAX_ACTIVE:64}
          max-idle: ${SPRING_DATA_REDIS_LETTUCE_POOL_MAX_IDLE:32}
          min-idle: ${SPRING_DATA_REDIS_LETTUCE_POOL_MIN_IDLE:8}
          max-wait: ${SPRING_DATA_REDIS_LETTUCE_POOL_MAX_WAIT_MS:1000ms}
  kafka:
    listener:
      concurrency: ${SPRING_KAFKA_LISTENER_CONCURRENCY:4}
      ack-mode: ${SPRING_KAFKA_LISTENER_ACK_MODE:record}
      type: single
    consumer:
      max-poll-records: ${SPRING_KAFKA_CONSUMER_MAX_POLL_RECORDS:200}
      fetch-min-size: ${SPRING_KAFKA_CONSUMER_FETCH_MIN_BYTES:1}
      fetch-max-wait: ${SPRING_KAFKA_CONSUMER_FETCH_MAX_WAIT_MS:500}

management:
  metrics:
    distribution:
      percentiles-histogram:
        http:
          server:
            requests: true
      slo:
        http:
          server:
            requests: 100ms,250ms,500ms,800ms,1s,2s
